<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e6a3"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)"/>
  
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#purpleGrad)" stroke-width="1" opacity="0.6"/>
  <circle cx="100" cy="100" r="75" fill="none" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.4"/>
  
  <polygon 
    points="100,25 120,80 175,80 130,115 150,170 100,135 50,170 70,115 25,80 80,80" 
    fill="none" 
    stroke="url(#goldGrad)" 
    stroke-width="2"
    filter="url(#glow)"
  />
  
  <polygon 
    points="100,45 112,78 147,78 119,100 131,132 100,112 69,132 81,100 53,78 88,78" 
    fill="url(#goldGrad)" 
    opacity="0.3"
  />
  
  <circle cx="100" cy="100" r="12" fill="url(#goldGrad)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="6" fill="#f5e6a3"/>
  
  <circle cx="35" cy="50" r="2" fill="#f5e6a3" opacity="0.8"/>
  <circle cx="165" cy="45" r="1.5" fill="#f5e6a3" opacity="0.6"/>
  <circle cx="45" cy="150" r="2" fill="#f5e6a3" opacity="0.7"/>
  <circle cx="155" cy="145" r="1.5" fill="#f5e6a3" opacity="0.5"/>
  <circle cx="25" cy="100" r="1" fill="#f5e6a3" opacity="0.6"/>
  <circle cx="175" cy="95" r="1" fill="#f5e6a3" opacity="0.6"/>
</svg>